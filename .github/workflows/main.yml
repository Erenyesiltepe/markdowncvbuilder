      - name: Install Pandoc & Full LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-latex-recommended \
                                 texlive-latex-extra texlive-xetex texlive-fonts-recommended

      - name: Generate PDF
        run: |
          pandoc resume.md -o resume.pdf \
            --pdf-engine=xelatex \
            --variable=geometry:margin=1.2cm \
            --variable=mainfont:"DejaVu Sans" \
            -V colorlinks=true \
            -V linkcolor=blue \
            --standalone
